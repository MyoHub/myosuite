# This workflow will install Python dependencies, run tests

name: Python application

on:
  push:
    branches: [ "main" , "dev"]
    paths-ignore:
      - "docs/**"
      - "**/README.md"

  pull_request:
    branches: [ "main" , "dev"]
    paths-ignore:
      - "docs/**"
      - "**/README.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    env:
      DISPLAY: :0

    defaults:
      run:
        shell: bash -l {0}

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
    - name: Set environment variable for macOS
      if: ${{ runner.os == 'macOS' }}
      run: echo "SYSTEM_VERSION_COMPAT=0" >> $GITHUB_ENV

    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Prepare Linux
      if: ${{ runner.os == 'Linux' }}
      run: |
        sudo apt-get update -y -qq
        sudo apt-get install -y xvfb x11-xserver-utils
        sudo /usr/bin/Xvfb $DISPLAY -screen 0 1280x1024x24 &

    - name: Install dependencies
      run: |
        uv pip install -e .

    - name: Run MuJoCo Rendering test
      if: ${{ runner.os == 'Linux' }}
      run: uv run python -m mujoco.render_test

    - name: Test myoapi
      run: |
        conda activate $CONDA_DEFAULT_ENV
        uv run python -m myosuite.tests.test_myoapi

    - name: Run Test environment
      run: |
        uv run python -m myosuite.tests.test_myo

    - name: Install ffmpeg
      if: ${{ runner.os == 'Linux' }}
      run: |
        conda activate $CONDA_DEFAULT_ENV
        export PATH="$CONDA_PREFIX/bin:$PATH"
        sudo apt-get install --no-install-recommends ffmpeg
        uv pip install ffmpeg scikit-video

    - name: Test rendering
      if: ${{ runner.os == 'Linux' }}
      run: uv run python -m myosuite.utils.examine_env -e myoElbowPose1D6MRandom-v0 -r offscreen -n 1

    - name: Run Test jupyter-notebooks tutorials
      if: ${{ runner.os == 'Linux' }}
      run: |
        source myosuite/tests/test_tutorials.sh

    - name: Run Test gym/gymnasium + stable-baselines3
      if: ${{ runner.os == 'Linux' }}
      run: |
        source myosuite/tests/test_versions.sh
